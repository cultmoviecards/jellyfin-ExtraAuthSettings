<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img"
    aria-labelledby="title desc">
    <title id="title">Extra Auth Settings icon</title>
    <desc id="desc">1:1 Icon for the Extra Auth Settings Jellyfin plugin</desc>

    <defs>
        <linearGradient id="bgBase" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#7a6cff" />
            <stop offset="32%" stop-color="#9e62ff" />
            <stop offset="62%" stop-color="#ff5fd2" />
            <stop offset="100%" stop-color="#ff9b6b" />
        </linearGradient>

        <radialGradient id="blobBlue" cx="0.18" cy="0.72" r="0.44">
            <stop offset="0%" stop-color="#74d8ff" stop-opacity="0.95" />
            <stop offset="100%" stop-color="#74d8ff" stop-opacity="0" />
        </radialGradient>

        <radialGradient id="blobPink" cx="0.76" cy="0.34" r="0.40">
            <stop offset="0%" stop-color="#ff68d4" stop-opacity="0.9" />
            <stop offset="100%" stop-color="#ff68d4" stop-opacity="0" />
        </radialGradient>

        <radialGradient id="blobOrange" cx="0.50" cy="0.78" r="0.34">
            <stop offset="0%" stop-color="#ffbf4f" stop-opacity="0.92" />
            <stop offset="100%" stop-color="#ffbf4f" stop-opacity="0" />
        </radialGradient>

        <radialGradient id="blobPurple" cx="0.44" cy="0.12" r="0.40">
            <stop offset="0%" stop-color="#ad72ff" stop-opacity="0.75" />
            <stop offset="100%" stop-color="#ad72ff" stop-opacity="0" />
        </radialGradient>

        <filter id="bgBlur" x="-25%" y="-25%" width="150%" height="150%">
            <feGaussianBlur stdDeviation="42" />
        </filter>

        <filter id="textGlow" x="-40%" y="-40%" width="180%" height="180%">
            <feMorphology in="SourceAlpha" operator="dilate" radius="2" result="spread" />
            <feGaussianBlur in="spread" stdDeviation="14" result="blur1" />
            <feFlood flood-color="#ffffff" flood-opacity="0.95" result="f1" />
            <feComposite in="f1" in2="blur1" operator="in" result="glow1" />

            <feGaussianBlur in="spread" stdDeviation="30" result="blur2" />
            <feFlood flood-color="#ffd56a" flood-opacity="0.55" result="f2" />
            <feComposite in="f2" in2="blur2" operator="in" result="glow2" />

            <feMerge>
                <feMergeNode in="glow2" />
                <feMergeNode in="glow1" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="10" />
        </filter>

        <g id="sparkle4">
            <path d="M0 -22 C1 -8 1 -1 0 0 C-1 -1 -1 -8 0 -22Z" fill="#fff" />
            <path d="M0 22 C1 8 1 1 0 0 C-1 1 -1 8 0 22Z" fill="#fff" />
            <path d="M-22 0 C-8 1 -1 1 0 0 C-1 -1 -8 -1 -22 0Z" fill="#fff" />
            <path d="M22 0 C8 1 1 1 0 0 C1 -1 8 -1 22 0Z" fill="#fff" />
        </g>

        <g id="dash">
            <ellipse cx="0" cy="0" rx="28" ry="8" fill="#fff" />
        </g>

        <style>
            .script {
            fill: #ffffff;
            font-family: "Pacifico", "Brush Script MT", "Segoe Script", "Snell Roundhand", cursive;
            font-weight: 400;
            letter-spacing: 0.5px;
            }
        </style>
    </defs>

    <rect width="1024" height="1024" rx="00" fill="url(#bgBase)" />

    <g filter="url(#bgBlur)">
        <rect width="1024" height="1024" fill="url(#blobPurple)" />
        <rect width="1024" height="1024" fill="url(#blobBlue)" />
        <rect width="1024" height="1024" fill="url(#blobPink)" />
        <rect width="1024" height="1024" fill="url(#blobOrange)" />
    </g>

    <g opacity="0.25" filter="url(#softGlow)">
        <circle cx="178" cy="205" r="68" fill="#8af0ff" />
        <circle cx="772" cy="230" r="72" fill="#ff79db" />
        <circle cx="507" cy="775" r="115" fill="#ffc14d" />
        <circle cx="198" cy="832" r="80" fill="#7fd5ff" />
    </g>

    <g opacity="0.9">
        <g transform="translate(180 224) rotate(-38)">
            <use href="#dash" />
        </g>
        <g transform="translate(835 218) rotate(-38)">
            <use href="#dash" />
        </g>
        <g transform="translate(145 518) rotate(-10) scale(1.1 1)">
            <use href="#dash" />
        </g>
        <g transform="translate(855 518) rotate(8) scale(1.1 1)">
            <use href="#dash" />
        </g>
        <g transform="translate(336 836) rotate(-48) scale(1 0.95)">
            <use href="#dash" />
        </g>
        <g transform="translate(510 850) rotate(90) scale(1.15 1)">
            <use href="#dash" />
        </g>
    </g>

    <g opacity="0.95">
        <g transform="translate(150 366) scale(1.55)">
            <use href="#sparkle4" />
        </g>
        <g transform="translate(840 350) scale(1.35)">
            <use href="#sparkle4" />
        </g>
        <g transform="translate(858 790) scale(1.05)">
            <use href="#sparkle4" />
        </g>
        <g transform="translate(706 720) scale(0.85)">
            <use href="#sparkle4" />
        </g>
        <g transform="translate(230 810) scale(0.75)">
            <use href="#sparkle4" />
        </g>
        <g transform="translate(850 250) scale(0.7)">
            <use href="#sparkle4" />
        </g>
        <g transform="translate(230 475) scale(0.65)">
            <use href="#sparkle4" />
        </g>
    </g>

    <g fill="#fff" opacity="0.95">
        <circle cx="670" cy="178" r="2.5" />
        <circle cx="702" cy="205" r="2" />
        <circle cx="716" cy="238" r="2.3" />
        <circle cx="318" cy="575" r="2.2" />
        <circle cx="345" cy="555" r="2" />
        <circle cx="701" cy="866" r="2.2" />
        <circle cx="764" cy="824" r="1.8" />
        <circle cx="793" cy="648" r="2" />
    </g>

    <g filter="url(#textGlow)">
        <text class="script" x="512" y="310" text-anchor="middle" font-size="220">Extra</text>
        <text class="script" x="512" y="535" text-anchor="middle" font-size="205">Auth</text>
        <text class="script" x="512" y="760" text-anchor="middle" font-size="195">Settings</text>
    </g>
</svg>
