<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Extra Auth Settings banner</title>
  <desc id="desc">Wide glowing banner for the Extra Auth Settings Jellyfin plugin</desc>

  <defs>
    <linearGradient id="bgBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#726cff"/>
      <stop offset="28%" stop-color="#9865ff"/>
      <stop offset="62%" stop-color="#ff62d3"/>
      <stop offset="100%" stop-color="#ffa06d"/>
    </linearGradient>

    <radialGradient id="blobBlue" cx="0.12" cy="0.70" r="0.42">
      <stop offset="0%" stop-color="#70ddff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#70ddff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blobPink" cx="0.72" cy="0.28" r="0.38">
      <stop offset="0%" stop-color="#ff68d2" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#ff68d2" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blobOrange" cx="0.47" cy="0.86" r="0.30">
      <stop offset="0%" stop-color="#ffc14f" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffc14f" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blobPurple" cx="0.42" cy="0.10" r="0.38">
      <stop offset="0%" stop-color="#af73ff" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#af73ff" stop-opacity="0"/>
    </radialGradient>

    <filter id="bgBlur" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>

    <filter id="textGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="2" result="spread"/>
      <feGaussianBlur in="spread" stdDeviation="10" result="blur1"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.76" result="f1"/>
      <feComposite in="f1" in2="blur1" operator="in" result="glow1"/>

      <feGaussianBlur in="spread" stdDeviation="20" result="blur2"/>
      <feFlood flood-color="#ffd266" flood-opacity="0.5" result="f2"/>
      <feComposite in="f2" in2="blur2" operator="in" result="glow2"/>

      <feMerge>
        <feMergeNode in="glow2"/>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>

    <g id="sparkle4">
      <path d="M0 -18 C1 -6 1 -1 0 0 C-1 -1 -1 -6 0 -18Z" fill="#fff"/>
      <path d="M0 18 C1 6 1 1 0 0 C-1 1 -1 6 0 18Z" fill="#fff"/>
      <path d="M-18 0 C-6 1 -1 1 0 0 C-1 -1 -6 -1 -18 0Z" fill="#fff"/>
      <path d="M18 0 C6 1 1 1 0 0 C1 -1 6 -1 18 0Z" fill="#fff"/>
    </g>

    <g id="dash">
      <ellipse cx="0" cy="0" rx="24" ry="7" fill="#fff"/>
    </g>

    <style>
      .script {
        fill: #ffffff;
        font-family: "Pacifico", "Brush Script MT", "Segoe Script", "Snell Roundhand", cursive;
        font-weight: 400;
        letter-spacing: 0.4px;
      }
      .sub {
        fill: rgba(255,255,255,0.92);
        font-family: "Segoe UI", "Inter", "Helvetica Neue", Arial, sans-serif;
        font-weight: 600;
        letter-spacing: 2px;
      }
    </style>
  </defs>

  <rect width="1600" height="520" rx="48" fill="url(#bgBase)"/>

  <g filter="url(#bgBlur)">
    <rect width="1600" height="520" fill="url(#blobPurple)"/>
    <rect width="1600" height="520" fill="url(#blobBlue)"/>
    <rect width="1600" height="520" fill="url(#blobPink)"/>
    <rect width="1600" height="520" fill="url(#blobOrange)"/>
  </g>

  <g opacity="0.28" filter="url(#softGlow)">
    <circle cx="185" cy="160" r="78" fill="#8befff"/>
    <circle cx="1280" cy="146" r="82" fill="#ff7edd"/>
    <circle cx="756" cy="418" r="110" fill="#ffc24d"/>
    <circle cx="220" cy="420" r="80" fill="#88d9ff"/>
  </g>

  <g opacity="0.95">
    <g transform="translate(140 166) rotate(-36)"><use href="#dash"/></g>
    <g transform="translate(1450 150) rotate(-36)"><use href="#dash"/></g>
    <g transform="translate(130 326) rotate(-8) scale(1.1 1)"><use href="#dash"/></g>
    <g transform="translate(1460 340) rotate(8) scale(1.1 1)"><use href="#dash"/></g>
    <g transform="translate(540 412) rotate(-42)"><use href="#dash"/></g>
    <g transform="translate(835 422) rotate(90) scale(1.1 1)"><use href="#dash"/></g>
  </g>

  <g opacity="0.96">
    <g transform="translate(112 240) scale(1.55)"><use href="#sparkle4"/></g>
    <g transform="translate(1422 222) scale(1.4)"><use href="#sparkle4"/></g>
    <g transform="translate(1335 410) scale(1.1)"><use href="#sparkle4"/></g>
    <g transform="translate(1100 394) scale(0.88)"><use href="#sparkle4"/></g>
    <g transform="translate(420 432) scale(0.8)"><use href="#sparkle4"/></g>
    <g transform="translate(1365 120) scale(0.75)"><use href="#sparkle4"/></g>
  </g>

  <g fill="#fff" opacity="0.95">
    <circle cx="1145" cy="116" r="2.4"/>
    <circle cx="1188" cy="144" r="2"/>
    <circle cx="1206" cy="172" r="2.3"/>
    <circle cx="430" cy="316" r="2.2"/>
    <circle cx="470" cy="298" r="1.8"/>
    <circle cx="1208" cy="430" r="2"/>
  </g>

  <g filter="url(#textGlow)">
    <text class="script" x="800" y="250" text-anchor="middle" font-size="170">Extra Auth Settings</text>
  </g>

  <text class="sub" x="800" y="345" text-anchor="middle" font-size="38">
    JELLYFIN PLUGIN BY BANANABAGEL
  </text>
</svg>
